<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Your Tickets — Labour Day Beach Party</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Caveat:wght@600;700&family=DM+Mono:wght@400;500&family=Archivo+Black&display=swap" rel="stylesheet" />
<script>
  (function loadQR() {
    const cdns = [
      'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js',
      'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js',
    ];
    let i = 0;
    function tryNext() {
      if (i >= cdns.length) { window.__qrLoadError = 'All CDN sources failed'; return; }
      const s = document.createElement('script');
      s.src = cdns[i++];
      s.onload = () => { window.__qrLoaded = true; };
      s.onerror = tryNext;
      document.head.appendChild(s);
    }
    tryNext();
  })();
</script>
<script src="config.js"></script>
<style>
  :root {
    --orange-1: #ff6a1a;
    --orange-2: #ff3d00;
    --orange-3: #ffb347;
    --lime: #c6ff3a;
    --purple: #c89df0;
    --ink: #0a0a0a;
    --paper: #fff7e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--orange-2);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse at top right, rgba(255, 200, 80, 0.5), transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(255, 50, 0, 0.6), transparent 60%),
      linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
    padding: 20px 14px 60px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -40px; left: -40px;
    width: 240px; height: 240px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M100 180 Q 90 100 30 50 M100 180 Q 110 100 170 50 M100 180 Q 100 90 100 20 M100 180 Q 70 120 10 100 M100 180 Q 130 120 190 100' stroke='%230a0a0a' stroke-width='3' fill='none' opacity='0.15'/%3E%3C/svg%3E");
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    transform: rotate(-30deg);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -60px; right: -60px;
    width: 280px; height: 280px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M100 180 Q 90 100 30 50 M100 180 Q 110 100 170 50 M100 180 Q 100 90 100 20 M100 180 Q 70 120 10 100 M100 180 Q 130 120 190 100' stroke='%230a0a0a' stroke-width='3' fill='none' opacity='0.15'/%3E%3C/svg%3E");
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    transform: rotate(150deg);
    z-index: 0;
  }
  .container { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 28px; padding: 24px 12px 20px; }
  .event-badge {
    display: inline-block;
    background: var(--ink);
    color: var(--orange-3);
    padding: 6px 14px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transform: rotate(-2deg);
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 56px;
    line-height: 0.85;
    letter-spacing: -1px;
    color: var(--ink);
    text-transform: uppercase;
  }
  h1 .tickets {
    display: inline-block;
    background: var(--lime);
    padding: 4px 16px 8px;
    transform: rotate(-3deg);
    margin-top: 6px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .subtitle {
    margin-top: 18px;
    font-family: 'Caveat', cursive;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
  }
  .buyer {
    background: var(--purple);
    padding: 0 8px;
    display: inline-block;
    transform: rotate(-1deg);
  }
  .meta-wrap { text-align: center; margin-bottom: 24px; }
  .meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--paper);
    display: inline-block;
    padding: 6px 14px;
    transform: rotate(0.5deg);
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .ticket {
    background: var(--paper);
    margin-bottom: 28px;
    position: relative;
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    transform: rotate(-0.4deg);
  }
  .ticket:nth-child(even) {
    transform: rotate(0.6deg);
    box-shadow: -8px 8px 0 var(--ink);
  }
  .ticket-top {
    background: var(--ink);
    color: var(--orange-3);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ticket-number {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .ticket-number .num { color: var(--lime); }
  .ticket-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--lime);
    color: var(--ink);
    padding: 4px 10px;
    transform: rotate(2deg);
  }
  .ticket-body {
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
  }
  .ticket-body::before, .ticket-body::after {
    content: '✦';
    position: absolute;
    top: 0;
    font-size: 18px;
    color: var(--orange-2);
    background: var(--paper);
    padding: 0 6px;
    transform: translateY(-50%);
  }
  .ticket-body::before { left: 12px; }
  .ticket-body::after { right: 12px; }
  .qr-wrap {
    background: white;
    padding: 10px;
    border: 3px solid var(--ink);
    margin: 0 auto 18px;
    width: 240px;
    height: 240px;
    position: relative;
    box-shadow: 4px 4px 0 var(--orange-2);
  }
  .qr-wrap canvas, .qr-wrap img {
    display: block;
    width: 220px !important;
    height: 220px !important;
  }
  .qr-wrap.used { opacity: 0.25; filter: grayscale(1); }
  .used-stamp {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-family: 'Bowlby One', sans-serif;
    font-size: 44px;
    color: var(--orange-2);
    background: rgba(255, 247, 232, 0.9);

    display: none;

  .ticket.used .used-stamp { display: block; }
  .ticket-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    margin-bottom: 4px;
  }
  .ticket-code {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    word-break: break-all;
    padding: 0 12px;
    color: var(--ink);
  }
  .ticket-foot {
    padding: 14px 18px;
    border-top: 2px dashed var(--ink);
    background: linear-gradient(90deg, var(--orange-3) 0%, var(--paper) 100%);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--lime);
    border: 2px solid var(--ink);
    padding: 4px 10px;
  }
  .status-pill::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--ink);
    border-radius: 50%;
  }
  .ticket.used .status-pill { background: var(--purple); }
  .ticket.used .status-pill::before { background: var(--orange-2); }
  .event-info {
    background: var(--ink);
    color: var(--paper);
    padding: 24px 20px;
    margin-top: 32px;
    border: 3px solid var(--ink);
    box-shadow: -6px 6px 0 var(--lime);
    transform: rotate(-0.5deg);
  }
  .event-info h3 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--lime);
    margin-bottom: 14px;
  }
  .event-info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(255, 247, 232, 0.2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;

  }
  .event-info-row:last-child { border-bottom: 0; }
  .event-info-row .k {
    color: var(--orange-3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 10px;
    flex-shrink: 0;
  }
  .event-info-row .v {
    color: var(--paper);
    text-align: right;
    font-weight: 500;
    line-height: 1.4;
  }
  .instructions {
    background: var(--paper);
    border: 3px solid var(--ink);
    padding: 22px 20px;
    margin-top: 24px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .instructions h3 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    background: var(--lime);
    display: inline-block;
    padding: 4px 10px;
    transform: rotate(-1deg);
  }
  .instructions ol {
    padding-left: 22px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
  }
  .instructions li {
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }
  .error-state { text-align: center; padding: 60px 20px; }
  .error-state h2 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 56px;
    letter-spacing: 1px;
    color: var(--ink);
    background: var(--lime);
    display: inline-block;
    padding: 8px 16px;
    transform: rotate(-2deg);
    margin-bottom: 16px;
  }
  .error-state p {
    color: var(--ink);
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
  }
  .loading {
    text-align: center;
    padding: 80px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink);
  }
  footer {
    margin-top: 40px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .debug-panel {
    margin-top: 30px;
    padding: 20px;
    background: #1a1612;
    color: #a3e635;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    border-radius: 6px;
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    overflow-x: auto;
    text-align: left;
  }
  .debug-panel h3 {
    color: #facc15;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px dashed #3a332a;
  }
  .debug-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 10px;
    padding: 4px 0;
  }
  .debug-row .k { color: #facc15; }
  .debug-row .v { color: #f5eee0; word-break: break-all; }
  .debug-row .v.ok { color: #a3e635; }
  .debug-row .v.bad { color: #fb7185; }
  .debug-pre {
    margin-top: 10px;
    padding: 10px;
    background: #0a0807;
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-all;
    color: #f5eee0;
    max-height: 240px;
    overflow-y: auto;
  }
  .debug-hint {
    margin-top: 12px;
    padding: 10px;
    background: #3a2510;
    border-left: 3px solid #facc15;
    color: #fde68a;
    font-size: 11px;
    line-height: 1.5;
  }
  @media print {
    body { background: white; padding: 0; }
    body::before, body::after { display: none; }
    .instructions, .event-info, .debug-panel { display: none !important; }
    .ticket { page-break-inside: avoid; box-shadow: none; transform: none; border: 2px solid #000; }
  }
  .logo {
     display: block;
     margin: 0 auto 18px;
     height: 150px;
     width: auto;
     transform: rotate(-2deg);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <img src="assets/NEXA_black.png" alt="Nexa Events" class="logo" />
    <h1>Labour Day<br/>Beach<span class="tickets">Tickets</span></h1>
    <div class="subtitle" id="subtitle">Loading…</div>
  </header>
  <div id="content"><div class="loading">Fetching your tickets…</div></div>
  <footer>May 1 ✦ Northern Cove Penang ✦ 4PM–12AM</footer>
</div>
<script>
  const WEB_APP_URL = window.WEB_APP_URL;
  const subtitle = document.getElementById('subtitle');
  const content = document.getElementById('content');
  const params = new URLSearchParams(window.location.search);
  const key = params.get('k');

  const debugState = {
    url: null, key: key, webAppUrl: WEB_APP_URL,
    startTime: null, endTime: null, error: null, errorType: null,
    response: null, diagnosticFetch: null,
  };

  function fetchJson(url) {
    return new Promise(async (resolve, reject) => {
      debugState.url = url;
      debugState.startTime = Date.now();
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      try {
        const resp = await fetch(url, { method: 'GET', redirect: 'follow', signal: controller.signal });
        clearTimeout(timeout);
        debugState.endTime = Date.now();
        if (!resp.ok) {
          const err = new Error('HTTP ' + resp.status);
          err.type = 'HTTP_ERROR';
          err.detail = `Server returned HTTP ${resp.status} ${resp.statusText}`;
          return reject(err);
        }
        const data = await resp.json();
        resolve(data);
      } catch (e) {
        clearTimeout(timeout);
        debugState.endTime = Date.now();
        const err = new Error(e.message || 'fetch failed');
        if (e.name === 'AbortError') { err.type = 'TIMEOUT'; err.detail = 'Server did not respond within 15 seconds.'; }
        else if (e.name === 'SyntaxError') { err.type = 'BAD_JSON'; err.detail = 'Server response was not valid JSON: ' + e.message; }
        else { err.type = 'FETCH_ERROR'; err.detail = e.message || String(e); }
        reject(err);
      }
    });
  }

  async function runDiagnostic(url) {
    try {
      const resp = await fetch(url, { method: 'GET', redirect: 'follow', mode: 'cors' });
      const text = await resp.text();
      return {
        reached: true,
        status: resp.status,
        statusText: resp.statusText,
        contentType: resp.headers.get('content-type') || '(none)',
        bodyPreview: text.slice(0, 500),
        redirected: resp.redirected,
        finalUrl: resp.url,
      };
    } catch (err) {
      return { reached: false, error: err.message, errorName: err.name, hint: 'Fetch was blocked — usually CORS.' };
    }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function showError(title, msg, includeDebug = false) {
    subtitle.textContent = '';
    let html = `<div class="error-state"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(msg)}</p></div>`;
    if (includeDebug) html += renderDebugPanel();
    content.innerHTML = html;
  }

  function renderDebugPanel() {
    const durationMs = (debugState.endTime && debugState.startTime) ? (debugState.endTime - debugState.startTime) : null;
    const hint = getDebugHint();
    const rows = [
      ['Page URL', window.location.href, 'v'],
      ['Key param', debugState.key || '(missing)', debugState.key ? 'v' : 'v bad'],
      ['WEB_APP_URL', debugState.webAppUrl, debugState.webAppUrl && debugState.webAppUrl.endsWith('/exec') ? 'v ok' : 'v bad'],
      ['Request URL', debugState.url || '(not yet called)', 'v'],
      ['Error type', debugState.errorType || '(none)', 'v bad'],
      ['Error detail', debugState.error || '(none)', 'v bad'],
      ['Duration', durationMs !== null ? durationMs + 'ms' : '(n/a)', 'v'],
    ];
    let diagHtml = '';
    if (debugState.diagnosticFetch) {
      const d = debugState.diagnosticFetch;
      if (d.reached) {
        diagHtml = `
          <h3 style="margin-top:18px;">Diagnostic fetch</h3>
          <div class="debug-row"><span class="k">Status</span><span class="v ${d.status === 200 ? 'ok' : 'bad'}">${d.status} ${escapeHtml(d.statusText)}</span></div>
          <div class="debug-row"><span class="k">Content-Type</span><span class="v">${escapeHtml(d.contentType)}</span></div>
          <div class="debug-row"><span class="k">Redirected</span><span class="v">${d.redirected ? 'yes → ' + escapeHtml(d.finalUrl) : 'no'}</span></div>
          <div class="debug-row"><span class="k">Body preview</span><span class="v"></span></div>
          <div class="debug-pre">${escapeHtml(d.bodyPreview) || '(empty)'}</div>
        `;
      } else {
        diagHtml = `
          <h3 style="margin-top:18px;">Diagnostic fetch</h3>
          <div class="debug-row"><span class="k">Result</span><span class="v bad">Blocked (${escapeHtml(d.errorName || 'error')})</span></div>
          <div class="debug-row"><span class="k">Message</span><span class="v">${escapeHtml(d.error || '')}</span></div>
          <div class="debug-hint">${escapeHtml(d.hint || '')}</div>
        `;
      }
    }
    return `<div class="debug-panel"><h3>Debug info</h3>${rows.map(([k, v, cls]) => `<div class="debug-row"><span class="k">${escapeHtml(k)}</span><span class="${cls}">${escapeHtml(String(v))}</span></div>`).join('')}${diagHtml}${hint ? `<div class="debug-hint">${hint}</div>` : ''}</div>`;
  }

  function getDebugHint() {
    if (!debugState.webAppUrl || debugState.webAppUrl.includes('PASTE_YOUR')) {
      return '<b>Fix:</b> WEB_APP_URL has not been set in config.js.';
    }
    if (debugState.webAppUrl && !debugState.webAppUrl.endsWith('/exec')) {
      return '<b>Fix:</b> WEB_APP_URL does not end in /exec.';
    }
    if (debugState.diagnosticFetch && debugState.diagnosticFetch.reached) {
      const d = debugState.diagnosticFetch;
      const body = (d.bodyPreview || '').toLowerCase();
      if (d.redirected && (d.finalUrl || '').includes('accounts.google.com')) {
        return '<b>Fix:</b> Request redirected to Google login. Set "Who has access" to "Anyone" on your deployment.';
      }
      if (body.includes('<!doctype') || body.includes('<html')) {
        return '<b>Fix:</b> Apps Script returned HTML instead of JSON — likely a permissions issue.';
      }
      if (d.status === 404) {
        return '<b>Fix:</b> URL returned 404. Check Manage deployments.';
      }
    }
    return '';
  }

  async function boot() {
    if (!WEB_APP_URL || WEB_APP_URL.includes('PASTE_YOUR')) {
      showError('Not configured', 'WEB_APP_URL has not been set in config.js.', true);
      return;
    }
    if (!key) {
      showError('Invalid link', 'This ticket link is missing its access key.', true);
      return;
    }
    const requestUrl = `${WEB_APP_URL}?action=get_tickets&key=${encodeURIComponent(key)}`;
    try {
      const resp = await fetchJson(requestUrl);
      debugState.response = resp;
      if (!resp.ok) {
        showError('Not Found', resp.error || 'Could not find tickets for this link.', true);
        return;
      }
      await render(resp.buyer_name, resp.tickets);
    } catch (err) {
      debugState.error = err.detail || err.message || String(err);
      debugState.errorType = err.type || 'UNKNOWN';
      debugState.diagnosticFetch = await runDiagnostic(requestUrl);
      showError('Connection Error', 'Could not load your tickets. See debug info below.', true);
    }
  }

  function waitForQR() {
    return new Promise((resolve) => {
      const start = Date.now();
      (function check() {
        if (typeof QRCode !== 'undefined') return resolve();
        if (window.__qrLoadError || (Date.now() - start > 8000)) return resolve();
        setTimeout(check, 100);
      })();
    });
  }

  function renderQRFallback(canvas, ticketId, errMsg) {
    const wrap = canvas.parentElement;
    const fallbackUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(ticketId);
    wrap.innerHTML = `<img src="${fallbackUrl}" alt="QR" width="220" height="220" style="display:block;" onerror="this.outerHTML='<div style=\\'width:220px;height:220px;background:#fee;border:2px solid #ff3d00;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;font-family:monospace;font-size:11px;color:#ff3d00;\\'>QR library failed. Show staff: <br/><b>${escapeHtml(ticketId)}</b></div>'" />`;
    if (errMsg) console.error('QR generation failed:', errMsg);
  }

  async function render(buyerName, tickets) {
    const unused = tickets.filter(t => !t.scanned).length;
    const total = tickets.length;
    subtitle.innerHTML = `Issued to <span class="buyer">${escapeHtml(buyerName)}</span>`;

    let html = `<div class="meta-wrap"><div class="meta">${unused}/${total} unused ✦ ${total} ticket${total === 1 ? '' : 's'}</div></div>`;

    tickets.forEach((t, idx) => {
      const num = String(idx + 1).padStart(2, '0');
      const totalStr = String(tickets.length).padStart(2, '0');
      html += `
        <div class="ticket ${t.scanned ? 'used' : ''}">
          <div class="ticket-top">
            <div class="ticket-number">Ticket <span class="num">${num}/${totalStr}</span></div>
            <div class="ticket-type">${escapeHtml(t.ticket_type || 'General')}</div>
          </div>
          <div class="ticket-body">
            <div class="qr-wrap ${t.scanned ? 'used' : ''}">
              <canvas id="qr-${idx}"></canvas>
            </div>
            <div class="used-stamp">USED</div>
            <div class="ticket-label">Ticket ID</div>
            <div class="ticket-code">${escapeHtml(t.ticket_id)}</div>
          </div>
          <div class="ticket-foot">
            <span class="status-pill">${t.scanned ? 'Scanned' : 'Valid'}</span>
            <span>Admits 1</span>
          </div>
        </div>
      `;
    });

    html += `
      <div class="event-info">
        <h3>Event Details</h3>
        <div class="event-info-row"><span class="k">Date</span><span class="v">May 1 — Labour Day</span></div>
        <div class="event-info-row"><span class="k">Time</span><span class="v">4PM – 12AM</span></div>
        <div class="event-info-row"><span class="k">Venue</span><span class="v">Northern Cove Penang</span></div>
        <div class="event-info-row"><span class="k">Address</span><span class="v">515 Jalan C M Hashim,<br/>Tanjung Tokong, George Town</span></div>
        <div class="event-info-row"><span class="k">After</span><span class="v">Prime Reloaded · 12AM–3AM</span></div>
      </div>
      <div class="instructions">
        <h3>How to use</h3>
        <ol>
          <li>Save this page or screenshot the QRs.</li>
          <li>At the door, show each QR code to staff — one per guest.</li>
          <li>Each code can only be scanned once. Keep this safe.</li>
        </ol>
      </div>
    `;
    content.innerHTML = html;

    await waitForQR();
    tickets.forEach((t, idx) => {
      const canvas = document.getElementById('qr-' + idx);
      if (!canvas) return;
      if (typeof QRCode === 'undefined') { renderQRFallback(canvas, t.ticket_id); return; }
      try {
        QRCode.toCanvas(canvas, t.ticket_id, {
          width: 220, margin: 1,
          color: { dark: '#0a0a0a', light: '#ffffff' },
          errorCorrectionLevel: 'M',
        }, (err) => { if (err) renderQRFallback(canvas, t.ticket_id, err.message); });
      } catch (e) { renderQRFallback(canvas, t.ticket_id, e.message); }
    });
  }

  boot();
</script>
</body>
</html>
