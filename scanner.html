<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ticket Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f4f1ea;
    --accent: #ff3b30;
    --valid: #16a34a;
    --invalid: #dc2626;
    --warn: #f59e0b;
    --muted: #6b6b6b;
    --card: #ffffff;
    --border: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 4px 4px;
    pointer-events: none;
    z-index: 0;
  }
  .app {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 20px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo .dot { color: var(--accent); }
  .staff-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .staff-name b { color: var(--ink); }

  /* Auth gate */
  .gate {
    text-align: center;
    padding: 40px 20px;
  }
  .gate h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .gate p {
    color: var(--muted);
    line-height: 1.6;
    font-size: 14px;
  }

  /* Scanner frame */
  .scanner-card {
    background: var(--ink);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 2px 0 var(--ink);
    position: relative;
  }
  .scanner-meta {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    border-bottom: 1px dashed rgba(255,255,255,0.15);
  }
  .scanner-meta .live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #reader {
    width: 100%;
    background: #000;
    min-height: 300px;
  }
  #reader video {
    width: 100% !important;
    height: auto !important;
    display: block;
  }
  /* Hide the html5-qrcode default UI chrome aggressively, we're building our own */
  #reader__dashboard_section_csr,
  #reader__dashboard_section_swaplink,
  #reader__header_message,
  #reader__status_span,
  #reader__camera_selection {
    display: none !important;
  }
  #reader__scan_region {
    background: #000 !important;
  }
  #reader__scan_region img {
    display: none !important;
  }

  /* Result display */
  .result {
    margin-top: 20px;
    border-radius: 16px;
    padding: 24px;
    min-height: 160px;
    position: relative;
    overflow: hidden;
    background: var(--card);
    border: 2px solid var(--border);
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.15s ease;
  }
  .result.idle {
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result.valid {
    background: var(--valid);
    color: white;
    border-color: var(--valid);
    animation: flash 0.4s ease;
  }
  .result.invalid {
    background: var(--invalid);
    color: white;
    border-color: var(--invalid);
    animation: shake 0.4s ease;
  }
  .result.warn {
    background: var(--warn);
    color: var(--ink);
    border-color: var(--warn);
    animation: flash 0.4s ease;
  }
  .result.loading {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  @keyframes flash {
    0% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .result-status {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .result-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    opacity: 0.9;
    line-height: 1.6;
  }
  .result-detail .label {
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 10px;
    opacity: 0.7;
    display: block;
    margin-top: 10px;
  }

  .controls {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    padding: 14px;
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    box-shadow: 3px 3px 0 var(--ink);
  }
  button:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }
  button.primary {
    background: var(--ink);
    color: var(--paper);
  }

  .log {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px dashed var(--ink);
  }
  .log-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .log-entry .time { color: var(--muted); flex-shrink: 0; }
  .log-entry.valid { color: var(--valid); }
  .log-entry.invalid { color: var(--invalid); }
  .log-entry.warn { color: #b45309; }

  .error-box {
    background: #fee;
    border: 2px solid var(--invalid);
    padding: 16px;
    border-radius: 12px;
    margin-top: 20px;
    font-size: 13px;
    line-height: 1.5;
  }

  /* Ticket stub accent at bottom */
  .stub {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 2px dashed var(--ink);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">SCANNER<span class="dot">.</span></div>
    <div class="staff-name" id="staffName">— not authenticated —</div>
  </header>

  <div id="main">
    <!-- Content populated by JS -->
  </div>

  <div class="stub">
    <span>Door Ops</span>
    <span id="stubCount">00 scans</span>
    <span id="stubDate"></span>
  </div>
</div>

<script>
  // ======================================================================
  // WEB_APP_URL is set in config.js (loaded above)
  // ======================================================================
  const WEB_APP_URL = window.WEB_APP_URL;

  const main = document.getElementById('main');
  const staffNameEl = document.getElementById('staffName');
  const stubCountEl = document.getElementById('stubCount');
  const stubDateEl = document.getElementById('stubDate');

  stubDateEl.textContent = new Date().toISOString().slice(0, 10);

  const params = new URLSearchParams(window.location.search);
  const token = params.get('k');
  let scannerName = null;
  let html5QrCode = null;
  let scanning = false;
  let lastScanTime = 0;
  let scanCount = 0;
  const log = [];
  const recentScans = new Set(); // dedupe rapid re-scans of same code

  // ======================================================================
  // Fetch helper — Apps Script returns JSON with CORS, so plain fetch works
  // ======================================================================
  function jsonp(url) {
    return new Promise(async (resolve, reject) => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      try {
        const resp = await fetch(url, { method: 'GET', redirect: 'follow', signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) return reject(new Error('HTTP ' + resp.status));
        const data = await resp.json();
        resolve(data);
      } catch (e) {
        clearTimeout(timeout);
        reject(new Error(e.name === 'AbortError' ? 'timeout' : (e.message || 'fetch failed')));
      }
    });
  }

  // ======================================================================
  // Boot
  // ======================================================================
  async function boot() {
    if (!WEB_APP_URL || WEB_APP_URL.includes('PASTE_YOUR')) {
      const msg = WEB_APP_URL === undefined
        ? 'config.js did not load or does not set window.WEB_APP_URL. Make sure config.js exists alongside scanner.html.'
        : 'Edit config.js and set WEB_APP_URL to your deployed Apps Script URL.';
      renderError('Configuration incomplete', msg);
      return;
    }
    if (!token) {
      renderGate('No access token', 'This page requires a valid scanner link. Ask the event organizer for your personal scanner URL.');
      return;
    }
    // Verify the token
    try {
      const resp = await jsonp(`${WEB_APP_URL}?action=check_scanner&token=${encodeURIComponent(token)}`);
      if (!resp.ok) {
        renderGate('Access denied', resp.reason || 'Your scanner link is not valid or has been disabled.');
        return;
      }
      scannerName = resp.name;
      staffNameEl.innerHTML = `Scanner: <b>${escapeHtml(scannerName)}</b>`;
      renderScanner();
    } catch (err) {
      renderError('Connection failed', 'Could not reach the validation server. Check your connection and try again.');
    }
  }

  function renderGate(title, msg) {
    main.innerHTML = `
      <div class="gate">
        <h1>${escapeHtml(title)}</h1>
        <p>${escapeHtml(msg)}</p>
      </div>
    `;
  }

  function renderError(title, msg) {
    main.innerHTML = `
      <div class="error-box">
        <strong>${escapeHtml(title)}</strong><br/>
        ${escapeHtml(msg)}
      </div>
    `;
  }

  function renderScanner() {
    main.innerHTML = `
      <div class="scanner-card">
        <div class="scanner-meta">
          <span class="live">LIVE</span>
          <span id="camStatus">INITIALIZING</span>
        </div>
        <div id="reader"></div>
      </div>
      <div id="result" class="result idle">AWAITING SCAN</div>
      <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="manualBtn" class="primary">Enter code</button>
      </div>
      <div class="log" id="logSection" style="display:none;">
        <div class="log-title">Scan history — this session</div>
        <div id="logList"></div>
      </div>
    `;
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('manualBtn').addEventListener('click', manualEntry);
    startScanner();
  }

  async function startScanner() {
    const camStatus = document.getElementById('camStatus');
    html5QrCode = new Html5Qrcode('reader', { verbose: false });
    try {
      await html5QrCode.start(
        { facingMode: 'environment' },
        {
          fps: 10,
          qrbox: (w, h) => {
            const side = Math.min(w, h) * 0.7;
            return { width: side, height: side };
          },
          aspectRatio: 1.0,
        },
        onScanSuccess,
        () => {} // ignore per-frame failures
      );
      scanning = true;
      camStatus.textContent = 'READY';
    } catch (err) {
      camStatus.textContent = 'CAMERA ERROR';
      renderError('Camera unavailable', 'Could not start the camera. Grant camera permission and reload, or try a different browser.');
    }
  }

  async function togglePause() {
    const btn = document.getElementById('pauseBtn');
    const camStatus = document.getElementById('camStatus');
    if (!html5QrCode) return;
    if (scanning) {
      await html5QrCode.pause(true);
      scanning = false;
      btn.textContent = 'Resume';
      camStatus.textContent = 'PAUSED';
    } else {
      await html5QrCode.resume();
      scanning = true;
      btn.textContent = 'Pause';
      camStatus.textContent = 'READY';
    }
  }

  function manualEntry() {
    const id = prompt('Enter ticket ID:');
    if (id && id.trim()) validate(id.trim());
  }

  async function onScanSuccess(decodedText) {
    const now = Date.now();
    // Debounce: ignore scans within 1.5s of each other
    if (now - lastScanTime < 1500) return;
    // Also dedupe same code within 5s (prevents re-scanning held-up code)
    if (recentScans.has(decodedText)) return;
    lastScanTime = now;
    recentScans.add(decodedText);
    setTimeout(() => recentScans.delete(decodedText), 5000);
    validate(decodedText);
  }

  async function validate(ticketId) {
    showResult('loading', 'CHECKING', 'Validating ticket…');
    try {
      const url = `${WEB_APP_URL}?action=validate&ticket_id=${encodeURIComponent(ticketId)}&token=${encodeURIComponent(token)}`;
      const resp = await jsonp(url);

      if (!resp.ok) {
        showResult('invalid', 'ERROR', resp.reason || 'Validation failed');
        addLog('invalid', ticketId, resp.reason || 'error');
        beep(150);
        return;
      }

      if (resp.status === 'valid') {
        showResult('valid', 'VALID', resp.buyer_name, resp.ticket_type);
        addLog('valid', ticketId, `${resp.buyer_name} — ${resp.ticket_type}`);
        scanCount++;
        stubCountEl.textContent = `${String(scanCount).padStart(2, '0')} scan${scanCount === 1 ? '' : 's'}`;
        beep(1);
      } else if (resp.status === 'already_scanned') {
        const when = resp.scanned_at ? new Date(resp.scanned_at).toLocaleTimeString() : '';
        showResult('warn', 'ALREADY IN', resp.buyer_name, resp.ticket_type, `Previously scanned${when ? ' at ' + when : ''}${resp.scanned_by ? ' by ' + resp.scanned_by : ''}`);
        addLog('warn', ticketId, `${resp.buyer_name} — already scanned`);
        beep(2);
      } else if (resp.status === 'invalid') {
        showResult('invalid', 'INVALID', 'Ticket not found in system');
        addLog('invalid', ticketId, 'not found');
        beep(150);
      } else if (resp.status === 'unauthorized') {
        showResult('invalid', 'DENIED', resp.reason || 'Not authorized');
        addLog('invalid', ticketId, 'unauthorized');
        beep(150);
      } else {
        showResult('invalid', 'UNKNOWN', 'Unexpected response');
        addLog('invalid', ticketId, 'unknown state');
      }
    } catch (err) {
      showResult('invalid', 'NO CONNECT', 'Could not reach server');
      addLog('invalid', ticketId, 'network error');
    }
  }

  function showResult(state, status, detail, ticketType, extra) {
    const el = document.getElementById('result');
    el.className = 'result ' + state;
    let html = `<div class="result-status">${escapeHtml(status)}</div>`;
    if (detail) {
      html += `<div class="result-detail">`;
      if (ticketType) {
        html += `<span class="label">Name</span>${escapeHtml(detail)}`;
        html += `<span class="label">Type</span>${escapeHtml(ticketType)}`;
      } else {
        html += escapeHtml(detail);
      }
      if (extra) html += `<span class="label">Note</span>${escapeHtml(extra)}`;
      html += `</div>`;
    }
    el.innerHTML = html;
  }

  function addLog(type, ticketId, detail) {
    const time = new Date().toLocaleTimeString();
    log.unshift({ type, ticketId, detail, time });
    if (log.length > 20) log.pop();
    const section = document.getElementById('logSection');
    const list = document.getElementById('logList');
    if (!list) return;
    section.style.display = 'block';
    list.innerHTML = log.map(entry => `
      <div class="log-entry ${entry.type}">
        <span>${escapeHtml(entry.detail)}</span>
        <span class="time">${entry.time}</span>
      </div>
    `).join('');
  }

  // Simple audio feedback using Web Audio API
  function beep(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (type === 1) {
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } else if (type === 2) {
        osc.frequency.value = 440; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } else {
        osc.frequency.value = 220; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.5);
      }
    } catch (e) { /* silent */ }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  boot();
</script>
</body>
</html>
