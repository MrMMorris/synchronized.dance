<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Door Scanner — Nexa Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Caveat+Brush&family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --night: #080808;
    --ember: #111111;
    --amber: #c9a227;
    --amber-deep: #8b6d14;
    --gold: #f0c040;
    --gold-soft: #d4af37;
    --flame: #c9a227;
    --teal: #0d9488;
    --teal-deep: #065f46;
    --red: #ce1126;
    --cream: #f0f0f0;
    --valid: #0d9488;
    --invalid: #dc2626;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--night);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, var(--ember) 0%, var(--night) 70%, var(--ember) 100%);
    padding: 16px 12px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 0 0.5 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
    mix-blend-mode: screen;
  }
  .app {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    padding: 10px 0 8px;
  }
  .top-logo {
     display: block;
     margin: 0 auto 14px;
     height: 80px;
     width: auto;
  }
  .top-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .top-tagline .dot { color: var(--amber); margin: 0 6px; }

  h1 {
    font-family: 'Bagel Fat One', cursive;
    font-size: 44px;
    line-height: 0.9;
    letter-spacing: -1px;
    color: var(--cream);
    text-transform: uppercase;
    text-shadow:
      0 2px 0 rgba(0,0,0,0.5),
      0 0 25px rgba(212, 175, 55, 0.25);
    transform: rotate(-1deg);
  }
  h1 .door {
    display: block;
    font-family: 'Caveat Brush', cursive;
    font-size: 42px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: none;
    transform: rotate(-3deg);
    margin-top: -4px;
    text-shadow:
      0 2px 0 rgba(0,0,0,0.6),
      0 0 20px rgba(240, 192, 64, 0.4);
  }
  .staff-line {
    margin-top: 12px;
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
  }
  .staff-line .name {
    color: var(--gold);
    font-style: italic;
  }

  /* Gate */
  .gate {
    text-align: center;
    padding: 40px 24px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(212, 175, 55, 0.25);
    border-radius: 14px;
    backdrop-filter: blur(8px);
  }
  .gate h2 {
    font-family: 'Bagel Fat One', cursive;
    font-size: 44px;
    color: var(--flame);
    text-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .gate p {
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.4;
  }

  /* Scanner camera */
  .scanner-card {
    background: var(--night);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 18px;
    position: relative;
    border: 1px solid rgba(212, 175, 55, 0.25);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 12px 30px -10px rgba(0,0,0,0.8),
      0 0 40px rgba(212, 175, 55, 0.08);
  }
  .scanner-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--amber) 50%, var(--gold) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
    z-index: 2;
  }
  .scanner-meta {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    border-bottom: 1px dashed rgba(212, 175, 55, 0.2);
    position: relative;
    z-index: 1;
  }
  .scanner-meta .live { color: var(--teal); }
  .scanner-meta .live::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.4s infinite;
    box-shadow: 0 0 12px var(--teal);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  #reader { width: 100%; background: #000; min-height: 300px; }
  #reader video { width: 100% !important; height: auto !important; display: block; }
  #reader__dashboard_section_csr,
  #reader__dashboard_section_swaplink,
  #reader__header_message,
  #reader__status_span,
  #reader__camera_selection {
    display: none !important;
  }
  #reader__scan_region { background: #000 !important; }
  #reader__scan_region img { display: none !important; }

  /* RESULT */
  .result {
    padding: 22px;
    min-height: 150px;
    margin-bottom: 16px;
    border-radius: 14px;
    transition: transform 0.12s ease;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .result.idle {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    text-align: center;
    color: var(--gold);
    font-family: 'Caveat Brush', cursive;
    font-size: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-1deg);
  }
  .result.loading {
    background: var(--ember);
    color: var(--gold);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result.valid {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%);
    color: white;
    border-color: var(--gold);
    animation: stamp 0.4s ease;
    box-shadow: 0 0 40px rgba(13, 148, 136, 0.5);
  }
  .result.invalid {
    background: linear-gradient(135deg, var(--invalid) 0%, #991b1b 100%);
    color: white;
    border-color: var(--invalid);
    animation: shake 0.4s ease;
    box-shadow: 0 0 40px rgba(220, 38, 38, 0.5);
  }
  .result.warn {
    background: linear-gradient(135deg, var(--warn) 0%, #b45309 100%);
    color: var(--night);
    border-color: var(--warn);
    animation: stamp 0.4s ease;
    box-shadow: 0 0 40px rgba(245, 158, 11, 0.5);
  }
  .result.cash {
    background: linear-gradient(135deg, #b45309 0%, #92400e 100%);
    color: #fff8e7;
    border-color: var(--gold);
    animation: stamp 0.4s ease;
    box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
  }
  .swipe-track {
    position: relative;
    height: 54px;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 27px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    margin-top: 18px;
    overflow: hidden;
    touch-action: none;
  }
  .swipe-handle {
    position: absolute;
    left: 4px;
    top: 4px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--night);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .swipe-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
    pointer-events: none;
    padding-left: 58px;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay .result {
    width: 100%;
    max-width: 420px;
    border-radius: 14px;
  }
  .modal-ok-btn {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    background: rgba(0, 0, 0, 0.35);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .modal-ok-btn:active { transform: scale(0.97); }
  .modal-btn-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .modal-btn-row .modal-ok-btn { margin-top: 0; }
  .modal-ok-btn.paid {
    background: var(--teal);
    border-color: var(--teal);
  }
  .confirm-prompt {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
  }
  .confirm-prompt .confirm-emoji {
    flex: 0 0 auto;
    font-size: 28px;
  }
  .confirm-prompt .confirm-text {
    flex: 1;
    text-align: center;
  }
  @keyframes stamp {
    0% { transform: scale(0.94) rotate(-1deg); }
    60% { transform: scale(1.02) rotate(0.5deg); }
    100% { transform: scale(1) rotate(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .result-status {
    font-family: 'Bagel Fat One', cursive;
    font-size: 60px;
    line-height: 0.9;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }
  .result-detail {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  .result-detail .label {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 10px;
    opacity: 0.75;
    display: block;
    margin-top: 10px;
    font-weight: 500;
  }
  .result-detail .value {
    font-size: 16px;
    font-weight: 500;
  }
  .result.valid .result-detail .name-big,
  .result.warn .result-detail .name-big {
    font-family: 'Bagel Fat One', cursive;
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-top: 4px;
    text-transform: uppercase;
    text-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 14px;
    border: 1px solid rgba(212, 175, 55, 0.25);
    background: rgba(0, 0, 0, 0.5);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.1s ease;
    border-radius: 10px;
    backdrop-filter: blur(8px);
  }
  button:active { transform: scale(0.97); }
  button.primary {
    background: linear-gradient(135deg, var(--amber) 0%, var(--amber-deep) 100%);
    color: var(--ember);
    border-color: var(--amber);
    box-shadow: 0 0 20px rgba(201, 162, 39, 0.3);
  }

  .walkin-bar {
    margin-bottom: 22px;
  }
  .walkin-bar button {
    width: 100%;
    border-style: dashed;
    border-color: rgba(212, 175, 55, 0.4);
  }

  /* Walk-in modal */
  .walkin-box .result-status { font-size: 40px; margin-bottom: 16px; }
  .walkin-field { margin-bottom: 14px; text-align: left; }
  .walkin-field .label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .walkin-field select {
    width: 100%;
    padding: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: rgba(0, 0, 0, 0.5);
    color: var(--cream);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
  }
  .stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .stepper button {
    width: 56px;
    height: 56px;
    padding: 0;
    font-size: 28px;
    line-height: 1;
    border-radius: 50%;
    border-color: var(--amber);
    color: var(--amber);
  }
  .stepper .qty {
    font-family: 'Bagel Fat One', cursive;
    font-size: 44px;
    min-width: 70px;
    text-align: center;
  }
  .walkin-total {
    margin: 18px 0 4px;
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 800;
    text-align: center;
  }
  .walkin-total .sub {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-top: 4px;
  }

  /* Log */
  .log {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 18px;
    backdrop-filter: blur(8px);
  }
  .log-title {
    font-family: 'Caveat Brush', cursive;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 12px;
    transform: rotate(-1deg);
    display: inline-block;
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 0;
    border-bottom: 1px dashed rgba(212, 175, 55, 0.15);
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  .log-entry:last-child { border-bottom: 0; }
  .log-entry .time {
    color: rgba(240, 240, 240, 0.5);
    flex-shrink: 0;
    font-size: 11px;
  }
  .log-entry.valid { color: #2dd4bf; font-weight: 500; }
  .log-entry.invalid { color: #f87171; font-weight: 500; }
  .log-entry.warn { color: var(--gold); font-weight: 500; }

  /* Stub */
  .stub {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed rgba(212, 175, 55, 0.2);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.6;
  }
  .stub b { color: var(--gold); font-weight: 700; }

  .error-box {
    background: rgba(206, 17, 38, 0.15);
    border: 1px solid var(--red);
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: var(--cream);
  }
  .error-box strong {
    font-family: 'Bagel Fat One', cursive;
    font-size: 22px;
    color: var(--flame);
    display: block;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <img src="assets/NEXA_white.png" alt="Nexa Events" class="top-logo" />
    <div class="top-tagline">★<span class="dot">•</span>Nexa Events<span class="dot">•</span>★</div>
    <h1>Nexa Events<span class="door">Door Scan</span></h1>
    <div class="staff-line">Hi, <span class="name" id="staffName">…</span></div>
  </header>

  <div id="main"></div>

  <div class="stub">
    <span><b>Door Ops</b></span>
    <span id="stubCount">00 Scans</span>
    <span id="stubDate"></span>
  </div>
</div>

<script>
  const WEB_APP_URL = window.WEB_APP_URL;
  const main = document.getElementById('main');
  const staffNameEl = document.getElementById('staffName');
  const stubCountEl = document.getElementById('stubCount');
  const stubDateEl = document.getElementById('stubDate');

  stubDateEl.textContent = new Date().toISOString().slice(0, 10);

  const params = new URLSearchParams(window.location.search);
  const token = params.get('k');
  let scannerName = null;
  let html5QrCode = null;
  let scanning = false;
  let lastScanTime = 0;
  let eventsData = [];
  let scanCount = 0;
  const log = [];
  const recentScans = new Set();

  function fetchJson(url) {
    return new Promise(async (resolve, reject) => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      try {
        const resp = await fetch(url, { method: 'GET', redirect: 'follow', signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) return reject(new Error('HTTP ' + resp.status));
        const data = await resp.json();
        resolve(data);
      } catch (e) {
        clearTimeout(timeout);
        reject(new Error(e.name === 'AbortError' ? 'timeout' : (e.message || 'fetch failed')));
      }
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function boot() {
    if (!WEB_APP_URL || WEB_APP_URL.includes('PASTE_YOUR')) {
      const msg = WEB_APP_URL === undefined
        ? 'config.js did not load. Make sure config.js exists alongside scanner.html.'
        : 'Edit config.js and set WEB_APP_URL to your deployed Apps Script URL.';
      renderError('Configuration', msg);
      return;
    }
    if (!token) {
      renderGate('No access', 'This page needs a valid scanner link. Ask the organizer for your personal scanner URL.');
      return;
    }
    try {
      const resp = await fetchJson(`${WEB_APP_URL}?action=check_scanner&token=${encodeURIComponent(token)}`);
      if (!resp.ok) {
        renderGate('Access denied', resp.reason || 'Your scanner link is not valid or has been disabled.');
        return;
      }
      scannerName = resp.name;
      staffNameEl.textContent = scannerName;
      try {
        const evResp = await fetch('events.json', { cache: 'no-store' });
        if (evResp.ok) eventsData = await evResp.json();
      } catch (e) { /* walk-in button just won't show if events can't load */ }
      renderScanner();
    } catch (err) {
      renderError('Connection failed', 'Could not reach the validation server. Check your connection.');
    }
  }

  function renderGate(title, msg) {
    staffNameEl.textContent = '— locked —';
    main.innerHTML = `<div class="gate"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(msg)}</p></div>`;
  }

  function renderError(title, msg) {
    staffNameEl.textContent = '— error —';
    main.innerHTML = `<div class="error-box"><strong>${escapeHtml(title)}</strong>${escapeHtml(msg)}</div>`;
  }

  function renderScanner() {
    main.innerHTML = `
      <div class="scanner-card">
        <div class="scanner-meta">
          <span class="live">Live</span>
          <span id="camStatus">Initializing…</span>
        </div>
        <div id="reader"></div>
      </div>
      <div id="result" class="result idle">Awaiting Scan</div>
      <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="manualBtn" class="primary">Enter ID</button>
      </div>
      ${eventsData.length ? `<div class="walkin-bar"><button id="walkinBtn">+ Walk-in Cash Sale</button></div>` : ''}
      <div class="log" id="logSection" style="display:none;">
        <div class="log-title">Scan History</div>
        <div id="logList"></div>
      </div>
    `;
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('manualBtn').addEventListener('click', manualEntry);
    const walkinBtn = document.getElementById('walkinBtn');
    if (walkinBtn) walkinBtn.addEventListener('click', showWalkinModal);
    startScanner();
  }

  async function startScanner() {
    const camStatus = document.getElementById('camStatus');
    html5QrCode = new Html5Qrcode('reader', { verbose: false });
    try {
      await html5QrCode.start(
        { facingMode: 'environment' },
        {
          fps: 10,
          qrbox: (w, h) => { const side = Math.min(w, h) * 0.7; return { width: side, height: side }; },
          aspectRatio: 1.0,
        },
        onScanSuccess,
        () => {}
      );
      scanning = true;
      camStatus.textContent = 'Ready';
    } catch (err) {
      camStatus.textContent = 'Camera Error';
      renderError('Camera unavailable', 'Could not start the camera. Grant camera permission and reload, or try a different browser.');
    }
  }

  async function togglePause() {
    const btn = document.getElementById('pauseBtn');
    const camStatus = document.getElementById('camStatus');
    if (!html5QrCode) return;
    if (scanning) {
      await html5QrCode.pause(true);
      scanning = false;
      btn.textContent = 'Resume';
      camStatus.textContent = 'Paused';
    } else {
      await html5QrCode.resume();
      scanning = true;
      btn.textContent = 'Pause';
      camStatus.textContent = 'Ready';
    }
  }

  function manualEntry() {
    const id = prompt('Enter ticket ID:');
    if (id && id.trim()) validate(id.trim());
  }

  async function onScanSuccess(decodedText) {
    const now = Date.now();
    if (now - lastScanTime < 1500) return;
    if (recentScans.has(decodedText)) return;
    lastScanTime = now;
    recentScans.add(decodedText);
    setTimeout(() => recentScans.delete(decodedText), 5000);
    validate(decodedText);
  }

  async function validate(ticketId) {
    showResult('loading', 'Checking', 'Validating ticket…');
    try {
      const url = `${WEB_APP_URL}?action=validate&ticket_id=${encodeURIComponent(ticketId)}&token=${encodeURIComponent(token)}`;
      const resp = await fetchJson(url);

      if (!resp.ok) {
        showResult('invalid', 'Error', resp.reason || 'Validation failed');
        addLog('invalid', ticketId, resp.reason || 'error');
        beep(150);
        return;
      }

      const pos = (resp.ticket_total && resp.ticket_total > 1)
        ? `${resp.ticket_index}/${resp.ticket_total}`
        : null;
      const logName = pos ? `${resp.buyer_name} (${pos})` : resp.buyer_name;

      if (resp.status === 'cash_due') {
        // Cash order: the server has NOT marked this scanned yet. Door staff
        // collect cash and swipe to confirm, which calls confirm_cash.
        showCashResult(resp.buyer_name, resp.ticket_type, pos, logName, ticketId);
        addLog('warn', ticketId, `${logName} — CASH DUE`);
        beep(2);
      } else if (resp.status === 'valid') {
        showResult('valid', 'Valid', resp.buyer_name, resp.ticket_type, null, pos);
        addLog('valid', ticketId, `${logName} — ${resp.ticket_type}`);
        scanCount++;
        stubCountEl.textContent = `${String(scanCount).padStart(2, '0')} Scan${scanCount === 1 ? '' : 's'}`;
        beep(1);
      } else if (resp.status === 'already_scanned') {
        const when = resp.scanned_at ? new Date(resp.scanned_at).toLocaleTimeString() : '';
        showResult('warn', 'Already In', resp.buyer_name, resp.ticket_type, `Previously scanned${when ? ' at ' + when : ''}${resp.scanned_by ? ' by ' + resp.scanned_by : ''}`, pos);
        addLog('warn', ticketId, `${logName} — already scanned`);
        beep(2);
      } else if (resp.status === 'invalid') {
        showResult('invalid', 'Invalid', 'Ticket not found');
        addLog('invalid', ticketId, 'not found');
        beep(150);
      } else if (resp.status === 'unauthorized') {
        showResult('invalid', 'Denied', resp.reason || 'Not authorized');
        addLog('invalid', ticketId, 'unauthorized');
        beep(150);
      } else {
        showResult('invalid', 'Unknown', 'Unexpected response');
        addLog('invalid', ticketId, 'unknown');
      }
    } catch (err) {
      showResult('invalid', 'No Signal', 'Could not reach server');
      addLog('invalid', ticketId, 'network error');
    }
  }

  function showResult(state, status, detail, ticketType, extra, ticketPos) {
    if (state === 'loading') {
      const el = document.getElementById('result');
      el.className = 'result loading';
      el.innerHTML = `<div style="font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;">${escapeHtml(detail)}</div>`;
      return;
    }
    let html = `<div class="result-status">${escapeHtml(status)}</div>`;
    if (detail) {
      html += `<div class="result-detail">`;
      if (ticketType) {
        html += `<span class="label">Name</span><div class="name-big">${escapeHtml(detail)}</div>`;
        html += `<span class="label">Type</span><span class="value">${escapeHtml(ticketType)}</span>`;
        if (ticketPos) html += `<span class="label">Ticket</span><span class="value">${escapeHtml(ticketPos)} in group</span>`;
      } else {
        html += `<div class="value">${escapeHtml(detail)}</div>`;
      }
      if (extra) html += `<span class="label">Note</span><span class="value">${escapeHtml(extra)}</span>`;
      html += `</div>`;
    }
    showModal(state, html);
  }

  function showModal(state, html) {
    const existing = document.getElementById('resultModal');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'resultModal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="result ${state}">
        ${html}
        <button class="modal-ok-btn" id="modalOkBtn">OK</button>
      </div>
    `;
    document.body.appendChild(overlay);
    const resultEl = document.getElementById('result');
    if (resultEl) { resultEl.className = 'result idle'; resultEl.innerHTML = 'Awaiting Scan'; }
    document.getElementById('modalOkBtn').addEventListener('click', () => overlay.remove());
  }

  function addLog(type, ticketId, detail) {
    const time = new Date().toLocaleTimeString();
    log.unshift({ type, ticketId, detail, time });
    if (log.length > 20) log.pop();
    const section = document.getElementById('logSection');
    const list = document.getElementById('logList');
    if (!list) return;
    section.style.display = 'block';
    list.innerHTML = log.map(entry => `
      <div class="log-entry ${entry.type}">
        <span>${escapeHtml(entry.detail)}</span>
        <span class="time">${entry.time}</span>
      </div>
    `).join('');
  }

  function beep(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (type === 1) {
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } else if (type === 2) {
        osc.frequency.value = 440; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } else {
        osc.frequency.value = 220; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.5);
      }
    } catch (e) {}
  }

  function showCashResult(buyerName, ticketType, pos, logName, ticketId) {
    const existing = document.getElementById('resultModal');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'resultModal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="result cash">
        <div class="result-status">Cash Due</div>
        <div class="result-detail">
          <span class="label">Name</span>
          <div class="name-big">${escapeHtml(buyerName)}</div>
          <span class="label">Type</span>
          <span class="value">${escapeHtml(ticketType)}</span>
          ${pos ? `<span class="label">Ticket</span><span class="value">${escapeHtml(pos)} in group</span>` : ''}
          <div class="swipe-track" id="swipeTrack">
            <div class="swipe-handle" id="swipeHandle">→</div>
            <div class="swipe-label">Swipe right — cash received</div>
          </div>
          <button class="modal-ok-btn" id="cashCloseBtn">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const resultEl = document.getElementById('result');
    if (resultEl) { resultEl.className = 'result idle'; resultEl.innerHTML = 'Awaiting Scan'; }
    document.getElementById('cashCloseBtn').addEventListener('click', () => overlay.remove());
    setupSwipe(() => {
      // After the swipe, require an explicit final confirmation before we tell
      // the server to mark the ticket scanned.
      showCashPaidConfirm(buyerName, ticketType, pos, logName, ticketId);
    });
  }

  // Second-step confirmation modal shown after the cash swipe. Only "Paid" calls
  // confirm_cash (which actually marks the ticket scanned); "Cancel" returns to
  // the swipe screen so the ticket stays unused if cash wasn't collected.
  function showCashPaidConfirm(buyerName, ticketType, pos, logName, ticketId) {
    const existing = document.getElementById('resultModal');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'resultModal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="result cash">
        <div class="confirm-prompt">
          <span class="confirm-emoji">⚠️</span>
          <span class="confirm-text">Please confirm that the ticket has been paid for</span>
          <span class="confirm-emoji">⚠️</span>
        </div>
        <div class="modal-btn-row">
          <button class="modal-ok-btn" id="cashCancelBtn">Cancel</button>
          <button class="modal-ok-btn paid" id="cashPaidBtn">Paid</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById('cashCancelBtn').addEventListener('click', () => {
      overlay.remove();
      showCashResult(buyerName, ticketType, pos, logName, ticketId);
    });

    document.getElementById('cashPaidBtn').addEventListener('click', async () => {
      // Confirm with the server — THIS is what actually marks the ticket scanned
      // for cash orders. Until this succeeds, the ticket stays unused, so a guest
      // who can't pay can simply be re-scanned later.
      const btn = document.getElementById('cashPaidBtn');
      btn.textContent = 'Confirming…';
      btn.disabled = true;
      try {
        const url = `${WEB_APP_URL}?action=confirm_cash&ticket_id=${encodeURIComponent(ticketId)}&token=${encodeURIComponent(token)}`;
        const resp = await fetchJson(url);
        overlay.remove();
        if (resp.ok && resp.status === 'valid') {
          scanCount++;
          stubCountEl.textContent = `${String(scanCount).padStart(2, '0')} Scan${scanCount === 1 ? '' : 's'}`;
          addLog('valid', ticketId, `${logName} — cash collected`);
          showResult('valid', 'Collected', buyerName, ticketType, 'Cash payment received', pos);
          beep(1);
        } else if (resp.ok && resp.status === 'already_scanned') {
          addLog('warn', ticketId, `${logName} — already scanned`);
          showResult('warn', 'Already In', buyerName, ticketType, 'Already scanned', pos);
          beep(2);
        } else {
          addLog('invalid', ticketId, 'cash confirm failed');
          showResult('invalid', 'Not Confirmed', resp.reason || 'Could not confirm — scan again');
          beep(150);
        }
      } catch (err) {
        overlay.remove();
        addLog('invalid', ticketId, 'cash confirm network error');
        showResult('invalid', 'No Signal', 'Could not confirm cash — scan again');
        beep(150);
      }
    });
  }

  // Walk-in cash sale: count tickets sold at the door with no online order.
  function showWalkinModal() {
    if (!eventsData.length) return;
    const existing = document.getElementById('resultModal');
    if (existing) existing.remove();

    let eventIdx = 0, typeIdx = 0, qty = 1;
    const overlay = document.createElement('div');
    overlay.id = 'resultModal';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);

    const curEvent = () => eventsData[eventIdx];
    const curTypes = () => (curEvent().ticket_types || []);
    const curType  = () => curTypes()[typeIdx] || { label: 'General Admission', price: 0 };

    function render() {
      const types = curTypes();
      const t = curType();
      const total = (t.price || 0) * qty;
      overlay.innerHTML = `
        <div class="result cash walkin-box">
          <div class="result-status">Walk-in</div>
          ${eventsData.length > 1 ? `
            <div class="walkin-field">
              <span class="label">Event</span>
              <select id="wkEvent">
                ${eventsData.map((e, i) => `<option value="${i}" ${i === eventIdx ? 'selected' : ''}>${escapeHtml(e.name)}</option>`).join('')}
              </select>
            </div>` : ''}
          ${types.length > 1 ? `
            <div class="walkin-field">
              <span class="label">Ticket Type</span>
              <select id="wkType">
                ${types.map((tt, i) => `<option value="${i}" ${i === typeIdx ? 'selected' : ''}>${escapeHtml(tt.label)} — RM${tt.price}</option>`).join('')}
              </select>
            </div>` : ''}
          <div class="walkin-field">
            <span class="label">Quantity</span>
            <div class="stepper">
              <button id="wkMinus">−</button>
              <span class="qty" id="wkQty">${qty}</span>
              <button id="wkPlus">+</button>
            </div>
          </div>
          <div class="walkin-total">RM${total}<span class="sub">${qty} × ${escapeHtml(t.label)} @ RM${t.price || 0}</span></div>
          <div class="modal-btn-row">
            <button class="modal-ok-btn" id="wkCancel">Cancel</button>
            <button class="modal-ok-btn paid" id="wkConfirm">Confirm</button>
          </div>
        </div>
      `;
      const evSel = document.getElementById('wkEvent');
      if (evSel) evSel.addEventListener('change', () => { eventIdx = parseInt(evSel.value, 10); typeIdx = 0; render(); });
      const tySel = document.getElementById('wkType');
      if (tySel) tySel.addEventListener('change', () => { typeIdx = parseInt(tySel.value, 10); render(); });
      document.getElementById('wkMinus').addEventListener('click', () => { if (qty > 1) { qty--; render(); } });
      document.getElementById('wkPlus').addEventListener('click', () => { qty++; render(); });
      document.getElementById('wkCancel').addEventListener('click', () => overlay.remove());
      document.getElementById('wkConfirm').addEventListener('click', () => {
        const t = curType();
        overlay.remove();
        showWalkinPaidConfirm(curEvent().id, `${t.label} — RM${t.price || 0}`, t.label, t.price || 0, qty);
      });
    }
    render();
  }

  // Same paid reminder as the cash-scan flow, then POST the walk-in to the server.
  function showWalkinPaidConfirm(eventId, ticketTypeFull, label, price, qty) {
    const existing = document.getElementById('resultModal');
    if (existing) existing.remove();
    const total = price * qty;
    const overlay = document.createElement('div');
    overlay.id = 'resultModal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="result cash">
        <div class="confirm-prompt">
          <span class="confirm-emoji">⚠️</span>
          <span class="confirm-text">Confirm ${qty} × ${escapeHtml(label)} walk-in — collect RM${total} cash</span>
          <span class="confirm-emoji">⚠️</span>
        </div>
        <div class="modal-btn-row">
          <button class="modal-ok-btn" id="wkBackBtn">Cancel</button>
          <button class="modal-ok-btn paid" id="wkPaidBtn">Paid</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById('wkBackBtn').addEventListener('click', () => {
      overlay.remove();
      showWalkinModal();
    });

    document.getElementById('wkPaidBtn').addEventListener('click', async () => {
      const btn = document.getElementById('wkPaidBtn');
      btn.textContent = 'Recording…';
      btn.disabled = true;
      try {
        // text/plain body (no Content-Type header) keeps this a CORS simple
        // request, same as buy.html's order POST.
        const resp = await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify({ type: 'walkin', token, event_id: eventId, ticket_type: ticketTypeFull, quantity: qty }),
        });
        const data = await resp.json();
        overlay.remove();
        if (data.ok) {
          scanCount += qty;
          stubCountEl.textContent = `${String(scanCount).padStart(2, '0')} Scan${scanCount === 1 ? '' : 's'}`;
          addLog('valid', 'walk-in', `Walk-in ×${qty} — RM${data.total} cash`);
          showResult('valid', 'Recorded', 'Walk-in', `${qty} × ${label}`, `RM${data.total} cash collected`);
          beep(1);
        } else {
          addLog('invalid', 'walk-in', 'walk-in failed');
          showResult('invalid', 'Failed', data.error || 'Could not record walk-in');
          beep(150);
        }
      } catch (err) {
        overlay.remove();
        addLog('invalid', 'walk-in', 'walk-in network error');
        showResult('invalid', 'No Signal', 'Could not record walk-in — try again');
        beep(150);
      }
    });
  }

  function setupSwipe(onConfirm) {
    const handle = document.getElementById('swipeHandle');
    const track = document.getElementById('swipeTrack');
    if (!handle || !track) return;
    let dragging = false;
    let startX = 0;
    const maxX = track.offsetWidth - handle.offsetWidth - 8;

    function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }
    function cleanup() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
    }
    function onStart(e) {
      dragging = true;
      startX = getX(e);
      handle.style.transition = 'none';
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      const delta = Math.max(0, Math.min(getX(e) - startX, maxX));
      handle.style.left = (4 + delta) + 'px';
      handle.style.background = delta >= maxX * 0.8 ? 'var(--teal)' : 'var(--night)';
      e.preventDefault();
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      const currentLeft = parseFloat(handle.style.left || '4') - 4;
      handle.style.transition = 'left 0.2s ease, background 0.2s ease';
      if (currentLeft >= maxX * 0.85) {
        handle.style.left = (4 + maxX) + 'px';
        cleanup();
        setTimeout(onConfirm, 200);
      } else {
        handle.style.left = '4px';
        handle.style.background = 'var(--night)';
      }
    }

    handle.addEventListener('touchstart', onStart, { passive: false });
    handle.addEventListener('touchmove', onMove, { passive: false });
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  }

  boot();
</script>
</body>
</html>
