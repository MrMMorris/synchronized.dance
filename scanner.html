<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Door Scanner — Labour Day Beach Party</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Caveat:wght@600;700&family=DM+Mono:wght@400;500;700&family=Archivo+Black&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --orange-1: #ff6a1a;
    --orange-2: #ff3d00;
    --orange-3: #ffb347;
    --lime: #c6ff3a;
    --purple: #c89df0;
    --ink: #0a0a0a;
    --paper: #fff7e8;
    --valid: #16a34a;
    --invalid: #dc2626;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--orange-2);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    background:
      radial-gradient(ellipse at top right, rgba(255, 200, 80, 0.5), transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(255, 50, 0, 0.6), transparent 60%),
      linear-gradient(180deg, var(--orange-1) 0%, var(--orange-2) 100%);
    padding: 16px 12px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M100 180 Q 90 100 30 50 M100 180 Q 110 100 170 50 M100 180 Q 100 90 100 20 M100 180 Q 70 120 10 100 M100 180 Q 130 120 190 100' stroke='%230a0a0a' stroke-width='3' fill='none' opacity='0.12'/%3E%3C/svg%3E");
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    transform: rotate(45deg);
    z-index: 0;
  }
  .app {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header — sticker style matching tickets.html */
  header {
    text-align: center;
    margin-bottom: 18px;
    padding: 14px 0 10px;
  }
  .event-badge {
    display: inline-block;
    background: var(--ink);
    color: var(--orange-3);
    padding: 5px 12px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transform: rotate(-2deg);
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 44px;
    line-height: 0.85;
    letter-spacing: -1px;
    color: var(--ink);
    text-transform: uppercase;
  }
  h1 .door {
    display: inline-block;
    background: var(--lime);
    padding: 2px 12px 6px;
    transform: rotate(-3deg);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .staff-line {
    margin-top: 12px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }
  .staff-line .name {
    background: var(--purple);
    padding: 0 8px;
    display: inline-block;
    transform: rotate(-1deg);
  }

  /* Gate (auth) */
  .gate {
    text-align: center;
    padding: 40px 20px;
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
  }
  .gate h2 {
    font-family: 'Bowlby One', sans-serif;
    font-size: 44px;
    letter-spacing: 1px;
    color: var(--orange-2);
    margin-bottom: 14px;
  }
  .gate p {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
  }

  /* Camera frame — heavy ticket-style border */
  .scanner-card {
    background: var(--ink);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    overflow: hidden;
    margin-bottom: 18px;
    position: relative;
  }
  .scanner-meta {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange-3);
    border-bottom: 1px dashed rgba(255, 179, 71, 0.3);
  }
  .scanner-meta .live { color: var(--lime); }
  .scanner-meta .live::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--lime);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.4s infinite;
    box-shadow: 0 0 8px var(--lime);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  #reader { width: 100%; background: #000; min-height: 300px; }
  #reader video { width: 100% !important; height: auto !important; display: block; }
  #reader__dashboard_section_csr,
  #reader__dashboard_section_swaplink,
  #reader__header_message,
  #reader__status_span,
  #reader__camera_selection {
    display: none !important;
  }
  #reader__scan_region { background: #000 !important; }
  #reader__scan_region img { display: none !important; }

  /* RESULT — high contrast for door staff to read instantly */
  .result {
    border: 3px solid var(--ink);
    padding: 22px;
    min-height: 150px;
    margin-bottom: 16px;
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform 0.12s ease;
    position: relative;
    overflow: hidden;
  }
  .result.idle {
    background: var(--paper);
    text-align: center;
    color: var(--ink);
    font-family: 'Bowlby One', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result.idle::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(45deg, transparent 48%, var(--orange-3) 48%, var(--orange-3) 52%, transparent 52%),
      linear-gradient(-45deg, transparent 48%, var(--orange-3) 48%, var(--orange-3) 52%, transparent 52%);
    background-size: 14px 14px;
    opacity: 0.15;
    pointer-events: none;
  }
  .result.loading {
    background: var(--ink);
    color: var(--lime);
    text-align: center;
  }
  .result.valid {
    background: var(--valid);
    color: white;
    border-color: var(--ink);
    animation: stamp 0.4s ease;
  }
  .result.invalid {
    background: var(--invalid);
    color: white;
    border-color: var(--ink);
    animation: shake 0.4s ease;
  }
  .result.warn {
    background: var(--warn);
    color: var(--ink);
    border-color: var(--ink);
    animation: stamp 0.4s ease;
  }
  @keyframes stamp {
    0% { transform: scale(0.94) rotate(-1deg); }
    60% { transform: scale(1.02) rotate(0.5deg); }
    100% { transform: scale(1) rotate(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .result-status {
    font-family: 'Bowlby One', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-detail {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }
  .result-detail .label {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 10px;
    opacity: 0.75;
    display: block;
    margin-top: 10px;
    font-weight: 500;
  }
  .result-detail .value {
    font-size: 16px;
    font-weight: 500;
  }

  /* Big buyer name treatment for valid scans */
  .result.valid .result-detail .name-big,
  .result.warn .result-detail .name-big {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  button {
    font-family: 'Archivo Black', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 14px;
    border: 3px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    box-shadow: 4px 4px 0 var(--ink);
  }
  button:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }
  button.primary {
    background: var(--lime);
    color: var(--ink);
  }

  /* Scan log */
  .log {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: -4px 4px 0 var(--ink);
    padding: 18px;
    transform: rotate(-0.3deg);
  }
  .log-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 12px;
    background: var(--lime);
    display: inline-block;
    padding: 4px 10px;
    transform: rotate(-1deg);
  }
  .log-entry {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(0, 0, 0, 0.12);
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  .log-entry:last-child { border-bottom: 0; }
  .log-entry .time {
    color: rgba(0, 0, 0, 0.5);
    flex-shrink: 0;
    font-size: 11px;
  }
  .log-entry.valid {
    color: var(--valid);
    font-weight: 500;
  }
  .log-entry.invalid {
    color: var(--invalid);
    font-weight: 500;
  }
  .log-entry.warn {
    color: #b45309;
    font-weight: 500;
  }

  /* Stub at bottom */
  .stub {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 2px dashed var(--ink);
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .stub b {
    background: var(--ink);
    color: var(--lime);
    padding: 2px 6px;
  }

  .error-box {
    background: var(--paper);
    border: 3px solid var(--orange-2);
    padding: 18px;
    box-shadow: 6px 6px 0 var(--ink);
    margin-bottom: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .error-box strong {
    font-family: 'Bowlby One', sans-serif;
    font-size: 22px;
    color: var(--orange-2);
    display: block;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .logo {
     display: block;
     margin: 0 auto 14px;
     height: 48px;
     width: auto;
     transform: rotate(-2deg);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <img src="assets/NEXA_black.png" alt="Nexa Events" class="logo" />
    <h1>Beach<br/><span class="door">Door Scan</span></h1>
    <div class="staff-line">Hi, <span class="name" id="staffName">…</span></div>
  </header>

  <div id="main"></div>

  <div class="stub">
    <span><b>DOOR OPS</b></span>
    <span id="stubCount">00 SCANS</span>
    <span id="stubDate"></span>
  </div>
</div>

<script>
  const WEB_APP_URL = window.WEB_APP_URL;
  const main = document.getElementById('main');
  const staffNameEl = document.getElementById('staffName');
  const stubCountEl = document.getElementById('stubCount');
  const stubDateEl = document.getElementById('stubDate');

  stubDateEl.textContent = new Date().toISOString().slice(0, 10);

  const params = new URLSearchParams(window.location.search);
  const token = params.get('k');
  let scannerName = null;
  let html5QrCode = null;
  let scanning = false;
  let lastScanTime = 0;
  let scanCount = 0;
  const log = [];
  const recentScans = new Set();

  function fetchJson(url) {
    return new Promise(async (resolve, reject) => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      try {
        const resp = await fetch(url, { method: 'GET', redirect: 'follow', signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) return reject(new Error('HTTP ' + resp.status));
        const data = await resp.json();
        resolve(data);
      } catch (e) {
        clearTimeout(timeout);
        reject(new Error(e.name === 'AbortError' ? 'timeout' : (e.message || 'fetch failed')));
      }
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function boot() {
    if (!WEB_APP_URL || WEB_APP_URL.includes('PASTE_YOUR')) {
      const msg = WEB_APP_URL === undefined
        ? 'config.js did not load. Make sure config.js exists alongside scanner.html.'
        : 'Edit config.js and set WEB_APP_URL to your deployed Apps Script URL.';
      renderError('Configuration', msg);
      return;
    }
    if (!token) {
      renderGate('No access', 'This page needs a valid scanner link. Ask the organizer for your personal scanner URL.');
      return;
    }
    try {
      const resp = await fetchJson(`${WEB_APP_URL}?action=check_scanner&token=${encodeURIComponent(token)}`);
      if (!resp.ok) {
        renderGate('Access denied', resp.reason || 'Your scanner link is not valid or has been disabled.');
        return;
      }
      scannerName = resp.name;
      staffNameEl.textContent = scannerName;
      renderScanner();
    } catch (err) {
      renderError('Connection failed', 'Could not reach the validation server. Check your connection.');
    }
  }

  function renderGate(title, msg) {
    staffNameEl.textContent = '— locked —';
    main.innerHTML = `<div class="gate"><h2>${escapeHtml(title)}</h2><p>${escapeHtml(msg)}</p></div>`;
  }

  function renderError(title, msg) {
    staffNameEl.textContent = '— error —';
    main.innerHTML = `<div class="error-box"><strong>${escapeHtml(title)}</strong>${escapeHtml(msg)}</div>`;
  }

  function renderScanner() {
    main.innerHTML = `
      <div class="scanner-card">
        <div class="scanner-meta">
          <span class="live">LIVE</span>
          <span id="camStatus">INITIALIZING…</span>
        </div>
        <div id="reader"></div>
      </div>
      <div id="result" class="result idle">Awaiting Scan</div>
      <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="manualBtn" class="primary">Enter ID</button>
      </div>
      <div class="log" id="logSection" style="display:none;">
        <div class="log-title">Scan history</div>
        <div id="logList"></div>
      </div>
    `;
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('manualBtn').addEventListener('click', manualEntry);
    startScanner();
  }

  async function startScanner() {
    const camStatus = document.getElementById('camStatus');
    html5QrCode = new Html5Qrcode('reader', { verbose: false });
    try {
      await html5QrCode.start(
        { facingMode: 'environment' },
        {
          fps: 10,
          qrbox: (w, h) => { const side = Math.min(w, h) * 0.7; return { width: side, height: side }; },
          aspectRatio: 1.0,
        },
        onScanSuccess,
        () => {}
      );
      scanning = true;
      camStatus.textContent = 'READY';
    } catch (err) {
      camStatus.textContent = 'CAMERA ERROR';
      renderError('Camera unavailable', 'Could not start the camera. Grant camera permission and reload, or try a different browser.');
    }
  }

  async function togglePause() {
    const btn = document.getElementById('pauseBtn');
    const camStatus = document.getElementById('camStatus');
    if (!html5QrCode) return;
    if (scanning) {
      await html5QrCode.pause(true);
      scanning = false;
      btn.textContent = 'Resume';
      camStatus.textContent = 'PAUSED';
    } else {
      await html5QrCode.resume();
      scanning = true;
      btn.textContent = 'Pause';
      camStatus.textContent = 'READY';
    }
  }

  function manualEntry() {
    const id = prompt('Enter ticket ID:');
    if (id && id.trim()) validate(id.trim());
  }

  async function onScanSuccess(decodedText) {
    const now = Date.now();
    if (now - lastScanTime < 1500) return;
    if (recentScans.has(decodedText)) return;
    lastScanTime = now;
    recentScans.add(decodedText);
    setTimeout(() => recentScans.delete(decodedText), 5000);
    validate(decodedText);
  }

  async function validate(ticketId) {
    showResult('loading', 'CHECKING', 'Validating ticket…');
    try {
      const url = `${WEB_APP_URL}?action=validate&ticket_id=${encodeURIComponent(ticketId)}&token=${encodeURIComponent(token)}`;
      const resp = await fetchJson(url);

      if (!resp.ok) {
        showResult('invalid', 'ERROR', resp.reason || 'Validation failed');
        addLog('invalid', ticketId, resp.reason || 'error');
        beep(150);
        return;
      }

      const pos = (resp.ticket_total && resp.ticket_total > 1)
        ? `${resp.ticket_index}/${resp.ticket_total}`
        : null;
      const logName = pos ? `${resp.buyer_name} (${pos})` : resp.buyer_name;

      if (resp.status === 'valid') {
        showResult('valid', 'VALID', resp.buyer_name, resp.ticket_type, null, pos);
        addLog('valid', ticketId, `${logName} — ${resp.ticket_type}`);
        scanCount++;
        stubCountEl.textContent = `${String(scanCount).padStart(2, '0')} SCAN${scanCount === 1 ? '' : 'S'}`;
        beep(1);
      } else if (resp.status === 'already_scanned') {
        const when = resp.scanned_at ? new Date(resp.scanned_at).toLocaleTimeString() : '';
        showResult('warn', 'ALREADY IN', resp.buyer_name, resp.ticket_type, `Previously scanned${when ? ' at ' + when : ''}${resp.scanned_by ? ' by ' + resp.scanned_by : ''}`, pos);
        addLog('warn', ticketId, `${logName} — already scanned`);
        beep(2);
      } else if (resp.status === 'invalid') {
        showResult('invalid', 'INVALID', 'Ticket not found');
        addLog('invalid', ticketId, 'not found');
        beep(150);
      } else if (resp.status === 'unauthorized') {
        showResult('invalid', 'DENIED', resp.reason || 'Not authorized');
        addLog('invalid', ticketId, 'unauthorized');
        beep(150);
      } else {
        showResult('invalid', 'UNKNOWN', 'Unexpected response');
        addLog('invalid', ticketId, 'unknown');
      }
    } catch (err) {
      showResult('invalid', 'NO SIGNAL', 'Could not reach server');
      addLog('invalid', ticketId, 'network error');
    }
  }

  function showResult(state, status, detail, ticketType, extra, ticketPos) {
    const el = document.getElementById('result');
    el.className = 'result ' + state;
    let html = `<div class="result-status">${escapeHtml(status)}</div>`;
    if (detail) {
      html += `<div class="result-detail">`;
      if (ticketType) {
        html += `<span class="label">Name</span><div class="name-big">${escapeHtml(detail)}</div>`;
        html += `<span class="label">Type</span><span class="value">${escapeHtml(ticketType)}</span>`;
        if (ticketPos) html += `<span class="label">Ticket</span><span class="value">${escapeHtml(ticketPos)} in group</span>`;
      } else {
        html += `<div class="value">${escapeHtml(detail)}</div>`;
      }
      if (extra) html += `<span class="label">Note</span><span class="value">${escapeHtml(extra)}</span>`;
      html += `</div>`;
    }
    el.innerHTML = html;
  }

  function addLog(type, ticketId, detail) {
    const time = new Date().toLocaleTimeString();
    log.unshift({ type, ticketId, detail, time });
    if (log.length > 20) log.pop();
    const section = document.getElementById('logSection');
    const list = document.getElementById('logList');
    if (!list) return;
    section.style.display = 'block';
    list.innerHTML = log.map(entry => `
      <div class="log-entry ${entry.type}">
        <span>${escapeHtml(entry.detail)}</span>
        <span class="time">${entry.time}</span>
      </div>
    `).join('');
  }

  function beep(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (type === 1) {
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } else if (type === 2) {
        osc.frequency.value = 440; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } else {
        osc.frequency.value = 220; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.5);
      }
    } catch (e) {}
  }

  boot();
</script>
</body>
</html>
