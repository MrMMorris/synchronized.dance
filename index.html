<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RE0PHC72VJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RE0PHC72VJ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Events</title>
<meta name="description" content="Dance music events in Penang. Good people, good music, good vibes.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: url('assets/background.jpg') center/cover no-repeat fixed;
    font-family: sans-serif;
    padding: 30px 16px;
    gap: 16px;
  }
  .bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.5s ease-in;
  }
  .bg-video.loaded { opacity: 1; }

  /* Event buttons */
  .events-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .events-heading {
    font-family: sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    padding: 5px 12px;
    border-radius: 6px;
    align-self: flex-start;
    max-width: 360px;
    width: fit-content;
    margin: 0 auto;
  }
  .event-btn {
    display: block;
    text-decoration: none;
    background: rgba(0, 0, 0, 0.72);
    border: 2px solid rgba(255, 255, 255, 0.35);
    border-radius: 14px;
    padding: 20px 24px;
    backdrop-filter: blur(12px);
    transition: all 0.18s ease;
    max-width: 360px;
    width: 100%;
    color: white;
    text-align: left;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .event-btn:hover {
    border-color: rgba(255,255,255,0.65);
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(0,0,0,0.55);
  }
  .event-btn-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 5px;
    line-height: 1.2;
  }
  .event-btn-location {
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }

  /* Signup form — same glass style, half width */
  .form {
    background: rgba(0, 0, 0, 0.72);
    border: 2px solid rgba(255, 255, 255, 0.35);
    border-radius: 14px;
    padding: 18px 16px;
    max-width: 180px;
    width: 100%;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    text-align: center;
    color: white;
    transition: all 0.6s ease;
  }
  .form.fade-out { opacity: 0; transform: scale(0.95); }
  .form h2 {
    font-size: 12px;
    font-weight: 700;
    color: white;
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .form h4 {
    font-size: 9px;
    font-weight: normal;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }
  .form input[type="email"] {
    width: 100%;
    padding: 9px 10px;
    margin: 0 auto 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 12px;
    display: block;
    text-align: center;
  }
  .form input[type="email"]::placeholder { color: rgba(255,255,255,0.4); }
  .form input[type="email"]:focus { outline: none; border-color: rgba(255,255,255,0.5); }
  .form button {
    width: 100%;
    padding: 9px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin: 0 auto;
    transition: background 0.15s;
  }
  .form button:hover { background: rgba(255,255,255,0.25); }
  .input--hidden { display: none; }
</style>
</head>
<body>
<video autoplay loop muted playsinline class="bg-video">
  <source src="assets/background.mp4" type="video/mp4">
</video>

<div class="events-section" id="eventsSection" style="display:none"></div>

<div class="form" id="signupForm">
  <h2>Get Notified</h2>
  <h4>no spam, ever</h4>
  <form id="sib-form" method="POST" action="https://d2fdd58e.sibforms.com/serve/MUIFAE8Vrj85rMcXC3sDXfp374lWxst71GzPrGpg7uetefPBvh7zFVGpTSwkDGf1tGCDylqEBiOo9HWVBzZlEQbft4YLel9n9vdJ4QL1ZgSeTTEBNUfCiKIxagoApnr8EnbI3ogO4XW8Hn8F5YMmo_5WTpO52x-RztGL6O9F-W9s00sJEbIjm5iwtB8vLwW_wq9A0Ht3iD5CoeVdNw==">
    <input type="email" name="EMAIL" placeholder="your@email.com" required>
    <input type="text" name="email_address_check" value="" class="input--hidden" style="position:absolute;left:-5000px;">
    <input type="hidden" name="locale" value="en">
    <input type="hidden" name="html_type" value="simple">
    <button type="submit" onclick="trackSignupClick()">Sign Up</button>
  </form>
</div>

<script>
  function trackSignupClick() { gtag('event', 'signup_click', { event_category: 'engagement', event_label: 'email_link' }); }
  function trackEventClick(name) { gtag('event', 'event_btn_click', { event_category: 'engagement', event_label: name }); }

  document.querySelector('.bg-video').addEventListener('loadeddata', function() {
    this.classList.add('loaded');
  });

  document.getElementById('sib-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formDiv = document.getElementById('signupForm');
    const emailInput = this.querySelector('input[name="EMAIL"]');
    if (!emailInput.validity.valid) { emailInput.reportValidity(); return; }
    fetch(this.action, { method: 'POST', body: new FormData(this), mode: 'no-cors' }).finally(() => {
      formDiv.classList.add('fade-out');
      setTimeout(() => {
        formDiv.innerHTML = '<h2>You\'re in!</h2><h4>check your inbox</h4>';
        formDiv.classList.remove('fade-out');
      }, 600);
    });
  });

  async function loadEvents() {
    const section = document.getElementById('eventsSection');
    let events;
    try {
      events = await fetch('/events.json').then(r => r.json());
    } catch (_) { return; }

    const now = Date.now();
    const active = events.filter(e => now <= new Date(e.date_iso).getTime() + 24 * 60 * 60 * 1000);
    if (active.length === 0) return;

    section.style.display = 'flex';
    let html = `<div class="events-heading">Upcoming Events</div>`;
    for (const ev of active) {
      html += `
        <a class="event-btn" href="/events/${ev.id}/" onclick="trackEventClick('${ev.name}')">
          <div class="event-btn-name">${ev.name}</div>
          <div class="event-btn-location">@ ${ev.venue}</div>
        </a>
      `;
    }
    section.innerHTML = html;
  }

  loadEvents();
</script>
</body>
</html>
