<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE0PHC72VJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE0PHC72VJ');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexa Events</title>
    <meta name="description" content="Sign up for exclusive updates about our dance music parties and events. Join our community for early access to lineups and ticket drops.">
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: url('assets/background.jpg') center/cover no-repeat fixed;
        font-family: sans-serif;
      }

      .bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      .bg-video.loaded {
        opacity: 1;
      }

      h2 {
        margin: 0;
      }

      h3 {
        margin: 0px;
        font-size: 12px;
        font-weight: normal;
      }

      h4 {
        font-size: 10px;
        margin-top: 10px;
        font-weight: normal;
      }

      
      .poster-box {
        margin: 0px; 
        display: flex;
        justify-content: center;
        max-width: 300px;
        width: 80%;
      }

      .poster-box img {
        width: 100%;
        height: auto;
        border: 3px solid white;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .poster-box img:hover {
        transform: scale(1.02);
      }

      .map-box {
        background: rgba(255, 255, 255);
        padding: 15px;
        border-radius: 12px;
        margin: 20px;
      }

      .map-link {
        display: flex;
        justify-content: center;
      }

      .map-icon {
        width: 50px;  
        height: auto;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
      }

      .modal img {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 12px;
      }

      .modal:target {
        display: flex;
      }

      .ticket-box {
        background: rgba(255, 255, 255);
        padding: 15px;
        border-radius: 12px;
      }

      .ticket-link {
        display: flex;
        justify-content: center;
        text-decoration: none;
      }

      .ticket-icon {
        font-size: 60px;
        line-height: 1;
      }

    </style>
  </head>
  <body>
    <!-- background.mp4 -->
    <video autoplay loop muted playsinline class="bg-video">
      <source src="assets/background.mp4" type="video/mp4">
    </video>

    <!-- Comment this div if no current poster -->
    <div class="poster-box">
      <!-- Path to poster -->
      <img src="assets/poster.webp?v=1" alt="Event Poster" fetchpriority="high" />
    </div>
    <div class="map-box">
      <!-- Google maps link -->
      <a href="https://maps.app.goo.gl/zzpVh7ByuNHCBdg48" target="_blank" class="map-link" onclick="trackMapClick()">
          <img src="assets/google_maps.webp" alt="Google Maps" class="map-icon" alt="Open map">
      </a> 
    </div>
      <!-- Ticket purchase button -->
      <div class="ticket-box">
        <a href="https://forms.gle/bNom85rrSMayCTLAA" target="_blank" class="ticket-link" onclick="trackTicketClick()">
          <span class="ticket-icon">🎟️</span>
        </a>
      </div>

  </body>

  <!-- GA tracking for map click -->
  <script>
    function trackMapClick() {
      gtag('event', 'map_click', {
        'event_category': 'engagement',
        'event_label': 'location_link'
      });
    }
  </script>

  <!-- GA tracking for ticket click -->
  <script>
    function trackTicketClick() {
      gtag('event', 'ticket_click', {
        'event_category': 'engagement',
        'event_label': 'ticket_link'
      });
    }
  </script>

  <!-- Enlarge poster on click -->
  <script>
    const poster = document.querySelector('.poster-box img');
    const body = document.body;
    
    poster.addEventListener('click', function() {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `<img src="${this.src}" alt="${this.alt}">`;
      body.appendChild(modal);
      
      setTimeout(() => modal.style.display = 'flex', 10);
      
      modal.addEventListener('click', function() {
        modal.style.display = 'none';
        setTimeout(() => modal.remove(), 300);
      });
    });
  </script>
  
  <!-- Video fade-in script -->
  <script>
    const video = document.querySelector('.bg-video');
    
    video.addEventListener('loadeddata', function() {
      video.classList.add('loaded');
    });
  </script>
</html>
