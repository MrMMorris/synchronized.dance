<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RE0PHC72VJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RE0PHC72VJ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Events</title>
<meta name="description" content="Dance music events in Penang. Good people, good music, good vibes.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: url('assets/background.jpg') center/cover no-repeat fixed;
    font-family: sans-serif;
    padding: 30px 16px 60px;
    gap: 24px;
  }
  body.no-events {
    justify-content: center;
  }
  .bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.5s ease-in;
  }
  .bg-video.loaded { opacity: 1; }
  .logo {
    height: 70px;
    width: auto;
    display: block;
  }
  /* Event buttons */
  .events-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .events-heading {
    font-family: sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    align-self: flex-start;
    max-width: 360px;
    width: 100%;
    margin: 0 auto;
  }
  .event-btn {
    display: block;
    text-decoration: none;
    background: rgba(0, 0, 0, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-left: 3px solid var(--accent, rgba(255,255,255,0.3));
    border-radius: 14px;
    padding: 18px 20px;
    backdrop-filter: blur(12px);
    transition: all 0.18s ease;
    max-width: 360px;
    width: 100%;
    color: white;
    text-align: left;
  }
  .event-btn:hover {
    background: rgba(0, 0, 0, 0.85);
    border-color: rgba(255, 255, 255, 0.28);
    border-left-color: var(--accent, rgba(255,255,255,0.5));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .event-btn-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .event-btn-date {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    opacity: 0.55;
    font-family: monospace;
    margin-bottom: 10px;
  }
  .event-btn-genres {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .event-btn-arrow {
    float: right;
    opacity: 0.4;
    font-size: 16px;
    margin-top: 2px;
  }
  /* Signup form */
  .signup-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }
  .form {
    background: rgba(255, 255, 255, 0.82);
    padding: 18px 16px;
    border-radius: 16px;
    text-align: center;
    max-width: 280px;
    width: 100%;
    backdrop-filter: blur(6px);
    transition: all 0.6s ease;
  }
  .form.fade-out { opacity: 0; transform: scale(0.95); }
  .form h2 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #111;
  }
  .form h4 {
    font-size: 10px;
    font-weight: normal;
    color: #444;
    margin-bottom: 10px;
  }
  .form input[type="email"] {
    width: 85%;
    padding: 10px;
    margin: 0 auto 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    display: block;
    text-align: center;
  }
  .form button {
    width: 55%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: block;
    margin: 0 auto;
  }
  .form button:hover { opacity: 0.85; }
  .input--hidden { display: none; }
</style>
</head>
<body>
<video autoplay loop muted playsinline class="bg-video">
  <source src="assets/background.mp4" type="video/mp4">
</video>

<img src="assets/NEXA_white.png" alt="Nexa Events" class="logo">

<div class="events-section" id="eventsSection" style="display:none"></div>

<div class="signup-wrap">
  <div class="form" id="signupForm">
    <h2>Get Notified About Our Next Party</h2>
    <h4>*we will <b>never</b> share your email with anyone*</h4>
    <form id="sib-form" method="POST" action="https://d2fdd58e.sibforms.com/serve/MUIFAE8Vrj85rMcXC3sDXfp374lWxst71GzPrGpg7uetefPBvh7zFVGpTSwkDGf1tGCDylqEBiOo9HWVBzZlEQbft4YLel9n9vdJ4QL1ZgSeTTEBNUfCiKIxagoApnr8EnbI3ogO4XW8Hn8F5YMmo_5WTpO52x-RztGL6O9F-W9s00sJEbIjm5iwtB8vLwW_wq9A0Ht3iD5CoeVdNw==">
      <input type="email" name="EMAIL" placeholder="Enter your email" required>
      <input type="text" name="email_address_check" value="" class="input--hidden" style="position:absolute;left:-5000px;">
      <input type="hidden" name="locale" value="en">
      <input type="hidden" name="html_type" value="simple">
      <button type="submit" onclick="trackSignupClick()">Sign Up</button>
    </form>
  </div>
</div>

<script>
  function trackSignupClick() { gtag('event', 'signup_click', { event_category: 'engagement', event_label: 'email_link' }); }
  function trackEventClick(name) { gtag('event', 'event_btn_click', { event_category: 'engagement', event_label: name }); }

  document.querySelector('.bg-video').addEventListener('loadeddata', function() {
    this.classList.add('loaded');
  });

  document.getElementById('sib-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formDiv = document.getElementById('signupForm');
    const emailInput = this.querySelector('input[name="EMAIL"]');
    if (!emailInput.validity.valid) { emailInput.reportValidity(); return; }
    fetch(this.action, { method: 'POST', body: new FormData(this), mode: 'no-cors' }).finally(() => {
      formDiv.classList.add('fade-out');
      setTimeout(() => {
        formDiv.innerHTML = '<h2>Success!</h2><h4>*check your inbox or spam for confirmation*</h4>';
        formDiv.classList.remove('fade-out');
      }, 600);
    });
  });

  async function loadEvents() {
    const section = document.getElementById('eventsSection');
    let events;
    try {
      events = await fetch('/events.json').then(r => r.json());
    } catch (_) { return; }

    const now = Date.now();
    const active = events.filter(e => now <= new Date(e.date_iso).getTime() + 24 * 60 * 60 * 1000);

    if (active.length === 0) {
      document.body.classList.add('no-events');
      return;
    }

    section.style.display = 'flex';
    let html = `<div class="events-heading">Upcoming Events</div>`;
    for (const ev of active) {
      const genreStr = ev.genres ? ev.genres.join(' · ') : '';
      html += `
        <a class="event-btn" href="/events/${ev.id}/" style="--accent:${ev.accent_color || 'rgba(255,255,255,0.3)'}" onclick="trackEventClick('${ev.name}')">
          <span class="event-btn-arrow">→</span>
          <div class="event-btn-date">${ev.date_display}</div>
          <div class="event-btn-name">${ev.name}</div>
          ${genreStr ? `<div class="event-btn-genres">${genreStr}</div>` : ''}
        </a>
      `;
    }
    section.innerHTML = html;
  }

  loadEvents();
</script>
</body>
</html>
